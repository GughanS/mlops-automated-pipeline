services:
  api:
    build:
      context: .
      dockerfile: ./api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./monitoring:/app/monitoring
      - ./frontend:/app/frontend
    environment:
      - MLFLOW_TRACKING_URI=file:///app/data/mlruns
      - mlflow

  mlflow:
    image: python:3.10-slim
    ports:
      - "5000:5000"
    volumes:
      - ./data/mlruns:/mlruns
    command: >
      sh -c "pip install mlflow && mlflow server --host 0.0.0.0 --port 5000 --default-artifact-root /mlruns"
