<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraud Detection AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/style.css">
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container glass-panel">
        <header>
            <div class="logo-container">
                <div class="logo-icon"></div>
                <h1>Fraud Detection AI</h1>
            </div>
            <button id="theme-toggle" class="icon-button" aria-label="Toggle Theme">
                <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    style="display:none;">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </header>

        <section class="description">
            <p>Enter credit card transaction details below to seamlessly analyze and predict potential fraud events
                using our advanced MLOps Pipeline.</p>
        </section>

        <form id="prediction-form" class="prediction-form">
            <div class="form-grid">
                <div class="input-group">
                    <label for="Time">Time (seconds)</label>
                    <input type="number" step="any" id="Time" name="Time" value="0" required>
                </div>
                <div class="input-group">
                    <label for="Amount">Transaction Amount ($)</label>
                    <input type="number" step="0.01" id="Amount" name="Amount" placeholder="e.g. 250.00" required>
                </div>
                <div class="input-group full-width">
                    <label for="pca_vector">PCA Vector (V1 - V28, comma separated)</label>
                    <input type="text" id="pca_vector" name="pca_vector"
                        placeholder="-1.3598, -0.0727, 2.5363, ... (28 values)" required>
                </div>
            </div>

            <div class="button-group" style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button type="button" class="secondary-button" id="autofill-btn"
                    style="flex: 1; padding: 14px; border-radius: 12px; border: 1px solid var(--primary-color); background: transparent; color: var(--text-main); cursor: pointer;">
                    Auto-Fill Test Transaction
                </button>
            </div>

            <button type="submit" class="primary-button" id="submit-btn">
                <span>Analyze Transaction</span>
                <div class="loader" style="display:none;"></div>
            </button>
        </form>

        <div id="result-container" class="result-container hidden">
            <div id="result-badge" class="result-badge">
                <span id="result-icon" class="status-icon"></span>
                <h2 id="result-text">Waiting...</h2>
            </div>
            <p id="result-details" class="result-details"></p>
        </div>
    </div>

    <script src="static/app.js?v=3"></script>
</body>

</html>
